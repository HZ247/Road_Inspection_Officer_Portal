<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FVO Portal – Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.10);
      padding: 44px 40px; width: 100%; max-width: 400px;
    }
    .header { text-align: center; margin-bottom: 32px; }
    .header .icon { font-size: 40px; }
    .header h1 { color: #1a4f8a; font-size: 22px; margin-top: 8px; }
    .header p  { color: #888; font-size: 13px; margin-top: 4px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #dde2ea; border-radius: 8px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #1a4f8a; }
    .form-group { margin-bottom: 18px; }
    .btn {
      width: 100%; padding: 13px;
      background: #1a4f8a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn:hover { background: #154070; }
    .btn:disabled { background: #99b5d3; cursor: not-allowed; }
    .msg {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .msg.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .footer { text-align: center; margin-top: 22px; font-size: 13px; color: #777; }
    .footer a { color: #1a4f8a; font-weight: 600; text-decoration: none; }
    .hint {
      margin-top: 20px; padding: 10px 14px;
      background: #f8fafc; border-radius: 8px;
      font-size: 12px; color: #888; text-align: center;
      border: 1px dashed #dde2ea;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">🏗️</div>
      <h1>FVO Portal</h1>
      <p>Field Verification Officer System</p>
    </div>
    <div class="msg error"   id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>
    <div class="form-group">
      <label>Employee ID</label>
      <input type="text" id="employee_id" placeholder="e.g. FVO001" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Login</button>
    <div class="footer">
      New officer? <a href="/register.html">Register here</a>
    </div>
    <div class="hint">
      <strong>Demo Admin:</strong> ID: ADMIN001 &nbsp;|&nbsp; Password: admin123
    </div>
  </div>

  <script>
    (function() {
      const token = localStorage.getItem('fvo_token');
      const role  = localStorage.getItem('fvo_role');
      if (token && role) {
        window.location.href = role === 'admin' ? '/admin/dashboard.html' : '/fvo/dashboard.html';
      }
    })();

    async function login() {
      const employee_id = document.getElementById('employee_id').value.trim();
      const password    = document.getElementById('password').value;
      const btn         = document.getElementById('loginBtn');
      showMsg('error', ''); showMsg('success', '');
      if (!employee_id || !password) return showMsg('error', 'Please enter your Employee ID and Password.');
      btn.disabled = true; btn.textContent = 'Logging in…';
      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employee_id, password })
        });
        const data = await res.json();
        if (!res.ok) return showMsg('error', data.error || 'Login failed.');
        localStorage.setItem('fvo_token',      data.token);
        localStorage.setItem('fvo_role',        data.role);
        localStorage.setItem('fvo_name',        data.name);
        localStorage.setItem('fvo_employee_id', data.employee_id);
        showMsg('success', `Welcome, ${data.name}! Redirecting…`);
        setTimeout(() => {
          window.location.href = data.role === 'admin' ? '/admin/dashboard.html' : '/fvo/dashboard.html';
        }, 800);
      } catch (err) {
        showMsg('error', 'Cannot connect to server. Make sure the server is running.');
      } finally {
        btn.disabled = false; btn.textContent = 'Login';
      }
    }

    function showMsg(type, text) {
      const el = document.getElementById(type + 'Msg');
      el.textContent = text;
      el.style.display = text ? 'block' : 'none';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>

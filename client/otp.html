<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FVO Portal – OTP Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #eef2f7; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 6px 30px rgba(0,0,0,0.10);
      padding: 44px 40px; width: 100%; max-width: 400px; text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #1a4f8a; font-size: 20px; }
    .subtitle { color: #777; font-size: 13px; margin-top: 6px; line-height: 1.5; }
    .employee-badge {
      display: inline-block; background: #e8f0fe; color: #1a4f8a;
      font-size: 13px; font-weight: 600;
      padding: 4px 14px; border-radius: 20px; margin: 16px 0;
    }
    .otp-hint {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: #92400e; margin-bottom: 24px;
    }
    .otp-boxes { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
    .otp-boxes input {
      width: 48px; height: 54px;
      border: 2px solid #dde2ea; border-radius: 10px;
      font-size: 22px; font-weight: 700;
      text-align: center; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .otp-boxes input:focus {
      border-color: #1a4f8a; box-shadow: 0 0 0 3px rgba(26,79,138,0.15);
    }
    .btn {
      width: 100%; padding: 13px;
      background: #1a4f8a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #154070; }
    .btn:disabled { background: #99b5d3; cursor: not-allowed; }
    .msg {
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .msg.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .footer { margin-top: 20px; font-size: 13px; color: #777; }
    .footer a { color: #1a4f8a; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📱</div>
    <h1>OTP Verification</h1>
    <p class="subtitle">An OTP has been sent to your registered mobile number</p>
    <div class="employee-badge" id="employeeBadge">Loading…</div>
    <div class="otp-hint">
      🔧 <strong>Prototype mode:</strong> Enter any 6 digits to verify
    </div>
    <div class="msg error"   id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>
    <div class="otp-boxes">
      <input type="text" maxlength="1" class="otp-digit" id="d1" />
      <input type="text" maxlength="1" class="otp-digit" id="d2" />
      <input type="text" maxlength="1" class="otp-digit" id="d3" />
      <input type="text" maxlength="1" class="otp-digit" id="d4" />
      <input type="text" maxlength="1" class="otp-digit" id="d5" />
      <input type="text" maxlength="1" class="otp-digit" id="d6" />
    </div>
    <button class="btn" id="verifyBtn" onclick="verifyOTP()">Verify OTP</button>
    <div class="footer">
      <a href="/register.html">← Back to Registration</a>
    </div>
  </div>

  <script>
    const params     = new URLSearchParams(window.location.search);
    const employeeId = params.get('eid') || '';
    document.getElementById('employeeBadge').textContent = employeeId || 'Unknown ID';

    const digits = document.querySelectorAll('.otp-digit');
    digits.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/[^0-9]/g, '');
        if (box.value && i < digits.length - 1) digits[i + 1].focus();
      });
      box.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !box.value && i > 0) digits[i - 1].focus();
      });
    });
    digits[0].focus();

    async function verifyOTP() {
      const otp = Array.from(digits).map(d => d.value).join('');
      const btn = document.getElementById('verifyBtn');
      showMsg('error', ''); showMsg('success', '');
      if (otp.length !== 6) return showMsg('error', 'Please enter all 6 digits.');
      if (!employeeId) return showMsg('error', 'Employee ID missing. Go back and register again.');
      btn.disabled = true; btn.textContent = 'Verifying…';
      try {
        const res  = await fetch('/api/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employee_id: employeeId, otp })
        });
        const data = await res.json();
        if (!res.ok) return showMsg('error', data.error || 'Verification failed.');
        showMsg('success', '✅ ' + data.message + ' Redirecting to login…');
        setTimeout(() => { window.location.href = '/login.html'; }, 1500);
      } catch (err) {
        showMsg('error', 'Cannot connect to server.');
      } finally {
        btn.disabled = false; btn.textContent = 'Verify OTP';
      }
    }

    function showMsg(type, text) {
      const el = document.getElementById(type + 'Msg');
      el.textContent = text;
      el.style.display = text ? 'block' : 'none';
    }
  </script>
</body>
</html>
